name: Image to Black and White Vector
on:
  workflow_dispatch:
    inputs:
      image_path:
        description: 'Path ke gambar (misal: images/goku.jpg)'
        required: true
        default: 'input.jpg'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick potrace

      - name: Process Image to Vector
        run: |
          # 1. Convert ke BMP hitam putih (High Contrast) pake ImageMagick
          convert ${{ github.event.inputs.image_path }} -colorspace gray -threshold 50% input_processed.bmp
          
          # 2. Trace jadi SVG pake Potrace
          potrace input_processed.bmp -s -o output_vector.svg
          
          # 3. (Opsional) Balikin ke PNG hitam putih biar bersih
          convert -density 1200 hasil.png

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: vector-result
          path: |
            hasil.png
