name: AI Image Processor Pro Max

on:
  workflow_dispatch:
    inputs:

      mode:
        description: "Select AI Mode"
        required: true
        type: choice
        options:
          - upscale
          - vector_bw
          - cartoon
          - style_3d

      image_url:
        description: "Direct Image URL"
        required: true

jobs:
  process:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Packages
        run: |
          sudo apt update
          sudo apt install -y ffmpeg imagemagick potrace wget libgl1 libglib2.0-0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install pillow numpy scipy tqdm rembg onnxruntime opencv-python-headless
          pip install basicsr==1.4.2
          pip install facexlib==0.3.0
          pip install gfpgan==1.3.8
          pip install realesrgan==0.3.0

      - name: Patch basicsr Compatibility
        run: |
          find /opt -name "degradations.py" -path "*/basicsr/*" -exec sed -i 's/from torchvision.transforms.functional_tensor import rgb_to_grayscale/from torchvision.transforms.functional import rgb_to_grayscale/g' {} \;
          echo "Patch done"

      - name: Download Models
        run: |
          mkdir -p models
          wget -O models/RealESRGAN_x4plus.pth https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth
          wget -O models/GFPGANv1.4.pth https://github.com/TencentARC/GFPGAN/releases/download/v1.3.0/GFPGANv1.4.pth

      - name: Download Image
        run: |
          mkdir -p input
          wget "${{ github.event.inputs.image_url }}" -O input/input.jpg

      - name: Create AI Script
        run: |
          cat > process.py << 'PY'
          import os
          import cv2
          import numpy as np
          from PIL import Image, ImageFilter

          mode = "${{ github.event.inputs.mode }}"
          os.makedirs("output", exist_ok=True)
          input_path = "input/input.jpg"
          output_path = "output/result.png"

          img = Image.open(input_path).convert("RGB")

          if mode == "upscale":
              import torch
              from realesrgan import RealESRGANer
              from basicsr.archs.rrdbnet_arch import RRDBNet

              print("Running AI Upscale...")

              model = RRDBNet(
                  num_in_ch=3,
                  num_out_ch=3,
                  num_feat=64,
                  num_block=23,
                  num_grow_ch=32,
                  scale=4
              )

              upsampler = RealESRGANer(
                  scale=4,
                  model_path="models/RealESRGAN_x4plus.pth",
                  model=model,
                  tile=0,
                  tile_pad=10,
                  pre_pad=0,
                  half=False
              )

              img_np = np.array(img)
              output, _ = upsampler.enhance(img_np, outscale=4)
              sr_image = Image.fromarray(output)
              sr_image = sr_image.filter(ImageFilter.SHARPEN)
              sr_image.save(output_path)
              print("Upscale Finished")

          elif mode == "vector_bw":
              print("Running Vector BW...")
              gray = img.convert("L")
              bw = gray.point(lambda x: 0 if x < 140 else 255, '1')
              bw.save("output/temp_bw.png")
              os.system("convert output/temp_bw.png output/temp_bw.pbm")
              os.system("potrace output/temp_bw.pbm -s -o output/result.svg")
              bw.save(output_path)
              print("Vector Finished")

          elif mode == "cartoon":
              print("Running Cartoon Style...")
              img_cv = cv2.cvtColor(np.array(img), cv2.COLOR_RGB2BGR)
              gray = cv2.cvtColor(img_cv, cv2.COLOR_BGR2GRAY)
              gray = cv2.medianBlur(gray, 5)
              edges = cv2.adaptiveThreshold(gray, 255, cv2.ADAPTIVE_THRESH_MEAN_C, cv2.THRESH_BINARY, 9, 9)
              color = cv2.bilateralFilter(img_cv, 9, 250, 250)
              cartoon = cv2.bitwise_and(color, color, mask=edges)
              cv2.imwrite(output_path, cartoon)
              print("Cartoon Finished")

          elif mode == "style_3d":
              print("Running 3D Style...")
              img_cv = cv2.cvtColor(np.array(img), cv2.COLOR_RGB2BGR)
              smooth = cv2.detailEnhance(img_cv, sigma_s=12, sigma_r=0.15)
              smooth = cv2.edgePreservingFilter(smooth, flags=1, sigma_s=64, sigma_r=0.2)
              smooth = cv2.GaussianBlur(smooth, (0,0), 1.2)
              cv2.imwrite(output_path, smooth)
              print("3D Style Finished")

          else:
              raise Exception("Unknown mode")

          print("ALL DONE")
          PY

      - name: Run AI Processor
        run: |
          python process.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: output/
