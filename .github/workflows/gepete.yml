name: AI Image Processor Pro Max

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Select Processing Mode"
        required: true
        type: choice
        options:
          - upscale
          - vector_bw
          - cartoon
          - style_3d

      image_url:
        description: "Direct Image URL"
        required: true

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      ##################################################################
      # SYSTEM
      ##################################################################

      - name: Install System Packages
        run: |
          sudo apt update

          sudo apt install -y \
            ffmpeg \
            imagemagick \
            potrace \
            python3-opencv \
            libgl1 \
            wget

      ##################################################################
      # PYTHON
      ##################################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python Packages
        run: |
          pip install --upgrade pip

          pip install \
            pillow \
            numpy \
            opencv-python \
            rembg \
            onnxruntime \
            realesrgan \
            gfpgan \
            basicsr \
            facexlib \
            torch \
            torchvision \
            diffusers \
            transformers \
            accelerate \
            safetensors \
            controlnet_aux

      ##################################################################
      # DOWNLOAD MODELS
      ##################################################################

      - name: Download AI Models
        run: |

          mkdir -p models

          ##############################################################
          # RealESRGAN
          ##############################################################

          wget -O models/RealESRGAN_x4plus.pth \
          https://github.com/xinntao/Real-ESRGAN/releases/download/v0.1.0/RealESRGAN_x4plus.pth

          ##############################################################
          # GFPGAN
          ##############################################################

          wget -O models/GFPGANv1.4.pth \
          https://github.com/TencentARC/GFPGAN/releases/download/v1.3.0/GFPGANv1.4.pth

      ##################################################################
      # DOWNLOAD IMAGE
      ##################################################################

      - name: Download Input Image
        run: |
          mkdir input
          wget "${{ github.event.inputs.image_url }}" -O input/input.jpg

      ##################################################################
      # CREATE SCRIPT
      ##################################################################

      - name: Create AI Script
        run: |

          cat > process.py << 'PY'
          import os
          import cv2
          import numpy as np
          from PIL import Image, ImageFilter
          from rembg import remove

          mode = "${{ github.event.inputs.mode }}"

          os.makedirs("output", exist_ok=True)

          input_path = "input/input.jpg"
          output_path = "output/result.png"

          img = Image.open(input_path).convert("RGB")

          ##############################################################
          # UPSCALE MODE
          ##############################################################

          if mode == "upscale":

              import torch
              from realesrgan import RealESRGAN

              device = torch.device("cuda" if torch.cuda.is_available() else "cpu")

              model = RealESRGAN(device, scale=4)
              model.load_weights("models/RealESRGAN_x4plus.pth")

              sr_image = model.predict(img)

              sr_image = sr_image.filter(ImageFilter.SHARPEN)

              sr_image.save(output_path)

          ##############################################################
          # VECTOR BLACK WHITE
          ##############################################################

          elif mode == "vector_bw":

              gray = img.convert("L")

              bw = gray.point(lambda x: 0 if x < 140 else 255, '1')

              bw.save("output/temp_bw.png")

              os.system(
                  "convert output/temp_bw.png output/temp_bw.pbm"
              )

              os.system(
                  "potrace output/temp_bw.pbm -s -o output/result.svg"
              )

              bw.save(output_path)

          ##############################################################
          # CARTOON MODE
          ##############################################################

          elif mode == "cartoon":

              img_cv = cv2.cvtColor(np.array(img), cv2.COLOR_RGB2BGR)

              gray = cv2.cvtColor(img_cv, cv2.COLOR_BGR2GRAY)

              gray = cv2.medianBlur(gray, 5)

              edges = cv2.adaptiveThreshold(
                  gray,
                  255,
                  cv2.ADAPTIVE_THRESH_MEAN_C,
                  cv2.THRESH_BINARY,
                  9,
                  9
              )

              color = cv2.bilateralFilter(img_cv, 9, 250, 250)

              cartoon = cv2.bitwise_and(color, color, mask=edges)

              cv2.imwrite(output_path, cartoon)

          ##############################################################
          # 3D STYLE
          ##############################################################

          elif mode == "style_3d":

              img_cv = cv2.cvtColor(np.array(img), cv2.COLOR_RGB2BGR)

              smooth = cv2.detailEnhance(img_cv, sigma_s=12, sigma_r=0.15)

              smooth = cv2.edgePreservingFilter(
                  smooth,
                  flags=1,
                  sigma_s=64,
                  sigma_r=0.2
              )

              smooth = cv2.GaussianBlur(smooth, (0,0), 1.2)

              cv2.imwrite(output_path, smooth)

          print("DONE")
          PY

      ##################################################################
      # RUN
      ##################################################################

      - name: Run AI Processor
        run: |
          python process.py

      ##################################################################
      # UPLOAD
      ##################################################################

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: output/
