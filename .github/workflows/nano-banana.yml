name: Manual - Nano-Banana B&W Converter

on:
  workflow_dispatch: # Ini kuncinya, murni manual run lewat tombol di GitHub

jobs:
  nano-banana-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai pillow

      - name: Run Nano-Banana AI Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python nano_banana_edit.py

      - name: Upload AI Processed Images
        uses: actions/upload-artifact@v4
        with:
          name: nano-banana-bw-results
          path: output_bw_style/
