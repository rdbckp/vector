name: Nano-Banana B&W Vector Style Converter

on:
  push:
    paths:
      - 'images/**' # Otomatis trigger kalau folder images di-update
  workflow_dispatch: # Ada tombol 'Run workflow' kalau mau jalanin manual

jobs:
  nano-banana-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai pillow

      - name: Run Nano-Banana AI Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Ngambil rahasia dari setting repo
        run: python nano_banana_edit.py

      - name: Upload AI Processed Images
        uses: actions/upload-artifact@v4
        with:
          name: nano-banana-bw-results
          path: output_bw_style/
