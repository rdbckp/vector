name: Ultimate AI Vector Redraw

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "AI style prompt"
        required: false
        default: "high contrast black and white vector stencil illustration"

jobs:
  ai_redraw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      ##########################################################
      # INSTALL
      ##########################################################

      - name: Install Packages
        run: |
          sudo apt update

          sudo apt install -y \
            python3-pip \
            jq \
            curl

          pip3 install \
            pillow \
            requests

      ##########################################################
      # PREPARE
      ##########################################################

      - name: Prepare Folder
        run: |
          mkdir -p input
          mkdir -p output

      ##########################################################
      # FIND IMAGE
      ##########################################################

      - name: Find Input Image
        id: image
        run: |

          FILE=$(find input -type f | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No image found"
            exit 1
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      ##########################################################
      # AI REDRAW USING STABILITY AI
      ##########################################################

      - name: AI Black White Redraw
        env:
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
        run: |

          INPUT_FILE="${{ steps.image.outputs.file }}"

          curl -f -sS \
            -X POST \
            "https://api.stability.ai/v2beta/stable-image/edit/sketch" \
            -H "Authorization: Bearer ${STABILITY_API_KEY}" \
            -H "Accept: image/*" \
            -F "image=@${INPUT_FILE}" \
            -F 'prompt=convert this exact image into a clean black and white vector stencil, preserve original composition, preserve object shape, preserve exact silhouette, minimal artistic changes, smooth edges, high contrast, logo style, monochrome, clean white background' \
            -F 'control_strength=0.95' \
            -F 'seed=1' \
            -o output/final_bw.png

      ##########################################################
      # VERIFY
      ##########################################################

      - name: Verify Output
        run: |
          ls -lah output/

      ##########################################################
      # UPLOAD FINAL PNG ONLY
      ##########################################################

      - name: Upload Final PNG
        uses: actions/upload-artifact@v4
        with:
          name: final_bw
          path: output/final_bw.png
