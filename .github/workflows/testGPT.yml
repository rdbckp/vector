name: BW Vector Clean PNG

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y python3-pip

          pip3 install \
            pillow \
            numpy \
            opencv-python

      - name: Prepare Folder
        run: |
          mkdir -p input
          mkdir -p output

      - name: Process Image
        run: |

          python3 << 'PY'

          import cv2
          import numpy as np
          import glob

          files = glob.glob("input/*")

          if not files:
              raise Exception("No image found")

          file = files[0]

          # =========================
          # LOAD
          # =========================

          img = cv2.imread(file)

          # =========================
          # UPSCALE
          # =========================

          img = cv2.resize(
              img,
              None,
              fx=8,
              fy=8,
              interpolation=cv2.INTER_CUBIC
          )

          # =========================
          # GRAYSCALE
          # =========================

          gray = cv2.cvtColor(
              img,
              cv2.COLOR_BGR2GRAY
          )

          # =========================
          # CONTRAST BOOST
          # =========================

          gray = cv2.convertScaleAbs(
              gray,
              alpha=2.2,
              beta=20
          )

          # =========================
          # BLUR
          # =========================

          blur = cv2.GaussianBlur(
              gray,
              (7,7),
              0
          )

          # =========================
          # OTSU THRESHOLD
          # =========================

          _, th = cv2.threshold(
              blur,
              0,
              255,
              cv2.THRESH_BINARY + cv2.THRESH_OTSU
          )

          # =========================
          # INVERT
          # =========================

          th = 255 - th

          # =========================
          # MORPH CLEANUP
          # =========================

          kernel = np.ones((5,5), np.uint8)

          th = cv2.morphologyEx(
              th,
              cv2.MORPH_CLOSE,
              kernel
          )

          th = cv2.morphologyEx(
              th,
              cv2.MORPH_OPEN,
              kernel
          )

          # =========================
          # KEEP BIG OBJECTS ONLY
          # =========================

          num_labels, labels, stats, _ = cv2.connectedComponentsWithStats(
              th,
              8
          )

          clean = np.zeros_like(th)

          for i in range(1, num_labels):

              area = stats[i, cv2.CC_STAT_AREA]

              if area > 5000:
                  clean[labels == i] = 255

          # =========================
          # FINAL SMOOTH
          # =========================

          clean = cv2.GaussianBlur(
              clean,
              (5,5),
              0
          )

          _, clean = cv2.threshold(
              clean,
              127,
              255,
              cv2.THRESH_BINARY
          )

          # =========================
          # SAVE
          # =========================

          cv2.imwrite(
              "output/final_bw.png",
              clean
          )

          PY

      - name: Upload Final PNG
        uses: actions/upload-artifact@v4
        with:
          name: final_bw
          path: output/final_bw.png
