name: Angel BW Clean

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y python3-pip

          pip3 install \
            pillow \
            numpy \
            opencv-python

      - name: Prepare Folder
        run: |
          mkdir -p input
          mkdir -p output

      - name: Process Image
        run: |

          python3 << 'PY'

          import cv2
          import numpy as np
          import glob

          files = glob.glob("input/*")

          if not files:
              raise Exception("No image found")

          file = files[0]

          # =========================
          # LOAD IMAGE
          # =========================

          img = cv2.imread(file)

          # =========================
          # UPSCALE
          # =========================

          img = cv2.resize(
              img,
              None,
              fx=8,
              fy=8,
              interpolation=cv2.INTER_CUBIC
          )

          # =========================
          # GRAYSCALE
          # =========================

          gray = cv2.cvtColor(
              img,
              cv2.COLOR_BGR2GRAY
          )

          # =========================
          # SMOOTH
          # =========================

          blur = cv2.GaussianBlur(
              gray,
              (9,9),
              0
          )

          # =========================
          # BRIGHTNESS MASK
          # =========================

          _, mask = cv2.threshold(
              blur,
              185,
              255,
              cv2.THRESH_BINARY
          )

          # =========================
          # CLEANUP
          # =========================

          kernel = np.ones((5,5), np.uint8)

          mask = cv2.morphologyEx(
              mask,
              cv2.MORPH_CLOSE,
              kernel
          )

          mask = cv2.morphologyEx(
              mask,
              cv2.MORPH_OPEN,
              kernel
          )

          # =========================
          # KEEP ONLY BIGGEST OBJECT
          # =========================

          contours, _ = cv2.findContours(
              mask,
              cv2.RETR_EXTERNAL,
              cv2.CHAIN_APPROX_SIMPLE
          )

          clean = np.zeros_like(mask)

          if contours:

              biggest = max(
                  contours,
                  key=cv2.contourArea
              )

              cv2.drawContours(
                  clean,
                  [biggest],
                  -1,
                  255,
                  thickness=cv2.FILLED
              )

          # =========================
          # INVERT
          # =========================

          final = 255 - clean

          # =========================
          # SAVE PNG
          # =========================

          cv2.imwrite(
              "output/final_bw.png",
              final
          )

          PY

      - name: Upload Final PNG
        uses: actions/upload-artifact@v4
        with:
          name: final_bw
          path: output/final_bw.png
