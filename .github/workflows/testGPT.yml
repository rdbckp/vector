```yaml
name: AI Vector BW PNG

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            imagemagick \
            python3-pip

          pip3 install \
            pillow \
            numpy \
            opencv-python

      - name: Prepare Folder
        run: |
          mkdir -p input
          mkdir -p output

      - name: Generate Clean Black White PNG
        run: |

          python3 << 'PY'

          import cv2
          import numpy as np
          import glob

          files = glob.glob("input/*")

          if not files:
              raise Exception("No image found inside input folder")

          file = files[0]

          # =========================
          # LOAD IMAGE
          # =========================

          img = cv2.imread(file)

          # =========================
          # UPSCALE
          # =========================

          img = cv2.resize(
              img,
              None,
              fx=6,
              fy=6,
              interpolation=cv2.INTER_CUBIC
          )

          # =========================
          # GRAYSCALE
          # =========================

          gray = cv2.cvtColor(
              img,
              cv2.COLOR_BGR2GRAY
          )

          # =========================
          # DENOISE
          # =========================

          gray = cv2.fastNlMeansDenoising(
              gray,
              None,
              15,
              7,
              21
          )

          # =========================
          # SMOOTH
          # =========================

          blur = cv2.GaussianBlur(
              gray,
              (7,7),
              0
          )

          # =========================
          # ADAPTIVE THRESHOLD
          # =========================

          th = cv2.adaptiveThreshold(
              blur,
              255,
              cv2.ADAPTIVE_THRESH_GAUSSIAN_C,
              cv2.THRESH_BINARY,
              51,
              2
          )

          # invert jadi object hitam
          th = 255 - th

          # =========================
          # MORPH CLEANUP
          # =========================

          kernel = np.ones((3,3), np.uint8)

          th = cv2.morphologyEx(
              th,
              cv2.MORPH_OPEN,
              kernel
          )

          th = cv2.morphologyEx(
              th,
              cv2.MORPH_CLOSE,
              kernel
          )

          # =========================
          # REMOVE SMALL NOISE
          # =========================

          num_labels, labels, stats, _ = cv2.connectedComponentsWithStats(
              th,
              8
          )

          clean = np.zeros_like(th)

          for i in range(1, num_labels):

              area = stats[i, cv2.CC_STAT_AREA]

              if area > 150:
                  clean[labels == i] = 255

          # =========================
          # FINAL SMOOTH
          # =========================

          clean = cv2.GaussianBlur(
              clean,
              (3,3),
              0
          )

          _, clean = cv2.threshold(
              clean,
              127,
              255,
              cv2.THRESH_BINARY
          )

          # =========================
          # SAVE FINAL PNG
          # =========================

          cv2.imwrite(
              "output/final_bw.png",
              clean
          )

          PY

      - name: Upload Final PNG
        uses: actions/upload-artifact@v4
        with:
          name: final_bw
          path: output/final_bw.png
```
