name: Nano Banana Image Processor

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Nama file gambar di root (contoh: image.png, foto.jpg)'
        required: true
        default: 'image.png'
      process_mode:
        description: 'Pilih model opsi gambar'
        required: true
        default: 'upscale'
        type: choice
        options:
          - upscale
          - image vector hitam putih
          - cartoon style
          - 3D style

jobs:
  process-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless pillow numpy

      - name: Run Image Processing
        env:
          IMAGE_NAME: ${{ github.event.inputs.image_name }}
          PROCESS_MODE: ${{ github.event.inputs.process_mode }}
        run: |
          python process_image.py

      - name: Upload Processed Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-${{ github.event.inputs.process_mode }}
          path: output_*.png
