name: Nano Banana Image Processor

on:
  workflow_dispatch:
    inputs:
      image_source:
        description: 'Masukkan URL Gambar ATAU nama file lokal di root (misal: image.png)'
        required: true
        default: 'https://example.com/sample.jpg'
      process_mode:
        description: 'Pilih model opsi gambar'
        required: true
        default: 'upscale'
        type: choice
        options:
          - 'upscale'
          - 'vector_bw'
          - 'cartoon'
          - 'style_3d'

permissions:
  contents: write

jobs:
  process-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Menginstall PyTorch versi CPU (ringan untuk Github Actions) & Super Image AI
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install super-image opencv-python-headless pillow numpy requests

      - name: Run Image Processing
        env:
          IMAGE_SOURCE: ${{ github.event.inputs.image_source }}
          PROCESS_MODE: ${{ github.event.inputs.process_mode }}
        run: |
          python process_image.py

      - name: Commit and Push Output Image to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output_*.png
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan gambar."
          else
            git commit -m "chore: upload hasil proses AI ${{ github.event.inputs.process_mode }}"
            git push
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Nano Banana AI Release #${{ github.run_number }}"
          body: |
            Hasil pemrosesan AI selesai!
            - **Mode Pemrosesan:** ${{ github.event.inputs.process_mode }}
          draft: false
          prerelease: false
          files: |
            output_*.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
